<!DOCTYPE html>
<!-- =====================================================================
     MODELE : HUB D'UN ELEVE
     A copier vers  public/<eleve>/index.html  pour creer le hub d'un eleve.
     A faire apres la copie :
       1) Remplacer Claire par le prenom de l'eleve (2 endroits).
       2) Remplir le tableau MODULES (un objet par module de l'eleve).
       3) Inscrire l'eleve dans le hub maitre : public/index.html (tableau STUDENTS).
     Un hub d'eleve N'EST PAS protege par mot de passe (seul le hub maitre l'est).
     ===================================================================== -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claire - Dessin-Provence</title>
<style>
  :root{--sombre:#514B4B;--blanc:#FFFFFF;--violet:#5E4B8B;--violet-moy:#998AB5;--violet-clair:#FBF8FF;--beige:#E8D5B5;--ombre:0 10px 30px rgba(94,75,139,.14);}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:var(--sombre);
    background:linear-gradient(180deg,var(--violet-clair) 0%,#FFFFFF 70%);min-height:100vh;padding:40px 18px 70px;}
  .wrap{max-width:880px;margin:0 auto;}
  header{text-align:center;margin-bottom:34px;}
  h1{font-weight:700;font-size:clamp(24px,5vw,36px);color:var(--violet);letter-spacing:.5px;margin:8px 0;text-transform:uppercase;}
  .subtitle{font-weight:400;font-size:15px;color:var(--violet-moy);letter-spacing:1px;text-transform:uppercase;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:8px;}
  .app-card{display:flex;flex-direction:column;background:var(--blanc);border:1px solid rgba(153,138,181,.45);
    border-radius:16px;box-shadow:var(--ombre);padding:24px;text-decoration:none;color:inherit;transition:transform .12s, box-shadow .12s;}
  .app-card:hover{transform:translateY(-3px);box-shadow:0 16px 38px rgba(94,75,139,.22);}
  .app-card .badge{align-self:flex-start;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--sombre);
    background:var(--beige);border-radius:20px;padding:4px 12px;margin-bottom:14px;}
  .app-card h2{font-weight:700;font-size:22px;color:var(--violet);margin:0 0 6px;}
  .app-card .desc{font-size:14px;line-height:1.5;margin:0 0 16px;}
  .app-card .go{margin-top:auto;font-weight:700;font-size:14px;color:var(--violet);}
  .app-card .go::after{content:" \2192";}
  .soon{display:flex;align-items:center;justify-content:center;text-align:center;border:2px dashed rgba(153,138,181,.5);
    border-radius:16px;padding:24px;color:var(--violet-moy);font-size:14px;min-height:140px;}
  footer{text-align:center;margin-top:40px;color:var(--violet-moy);font-size:13px;letter-spacing:.5px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Hub de Claire</h1>
    <div class="subtitle">Applications et exercices</div>
  </header>
  <section class="grid" id="grid"></section>
  <footer>Espace prive Dessin-Provence</footer>
</div>
<script>
/* Un objet par module de l'eleve.
   "url" = chemin du module = "/<eleve>/<module>/"  (toujours commencer et finir par /) */
const MODULES = [
  { titre: "Dessin de volumes en intersection", badge: "Atelier", description: "Des solides simples se croisent dans des orientations aleatoires. Chrono de 2 a 10 min, 1 a 3 volumes au choix, nouvelle scene a volonte.", url: "/claire/dessin-volumes-intersection/" },
];

const grid = document.getElementById('grid');
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
grid.innerHTML = MODULES.map(a=>`
  <a class="app-card" href="${esc(a.url)}">
    ${a.badge?`<span class="badge">${esc(a.badge)}</span>`:''}
    <h2>${esc(a.titre)}</h2>
    <p class="desc">${esc(a.description)}</p>
    <span class="go">Ouvrir</span>
  </a>`).join('') + (MODULES.length ? '' : '<div class="soon">Les modules de cet eleve viendront ici</div>');
</script>
</body>
</html>
