  :root{
    --noir:#000000;
    --sombre:#514B4B;
    --clair:#F5F5F5;
    --blanc:#FFFFFF;
    --violet:#5E4B8B;
    --violet-moy:#998AB5;
    --violet-clair:#FBF8FF;
    --beige:#E8D5B5;
    --ombre:0 10px 30px rgba(94,75,139,.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Advercase',-apple-system,Segoe UI,sans-serif;
    color:var(--sombre);
    background:linear-gradient(180deg,var(--violet-clair) 0%,#FFFFFF 70%);
    min-height:100vh;
    padding:34px 18px 70px;
  }
  .wrap{max-width:920px;margin:0 auto;}

  /* En-tête */
  header{text-align:center;margin-bottom:26px;}
  .logo{margin:0 auto 10px;max-width:220px;}
  .logo svg{width:100%;height:auto;display:block;}
  .logo svg path{fill:var(--violet);}
  .brandtitle{
    font-family:'Advercase',sans-serif;font-weight:700;
    font-size:clamp(22px,5vw,34px);
    color:var(--violet);
    letter-spacing:.5px;margin:6px 0 8px;text-transform:uppercase;
  }
  .subtitle{
    font-weight:400;font-size:15px;color:var(--violet-moy);
    letter-spacing:1px;text-transform:uppercase;
  }

  /* Forme de base */
  .shape-zone{
    display:flex;align-items:center;justify-content:center;gap:26px;
    background:var(--blanc);
    border:1px solid rgba(153,138,181,.45);
    border-radius:16px;
    box-shadow:var(--ombre);
    padding:22px 26px;margin:26px 0 0;flex-wrap:wrap;
  }
  .shape-frame{width:118px;height:118px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .shape-frame svg{width:118px;height:118px;}
  .shape-frame svg :where(circle,rect,polygon,ellipse,path){
    fill:rgba(153,138,181,.14);stroke:var(--violet);stroke-width:4;stroke-linejoin:round;
  }
  .shape-text{text-align:left;}
  .shape-text .lbl{font-size:13px;color:var(--violet-moy);text-transform:uppercase;letter-spacing:2px;}
  .shape-text .shape-name{font-weight:700;font-size:clamp(24px,5vw,36px);color:var(--violet);margin-top:6px;}

  /* Cartes sujets */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:18px 0;}
  @media(max-width:680px){.cards{grid-template-columns:1fr;}}
  .card{
    background:var(--blanc);
    border:1px solid rgba(153,138,181,.45);
    border-radius:16px;
    box-shadow:var(--ombre);
    padding:26px 16px;min-height:150px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;position:relative;
  }
  .card .num{
    position:absolute;top:-15px;left:50%;transform:translateX(-50%);
    background:var(--violet);color:var(--blanc);
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;
  }
  .card .word{font-weight:700;font-size:clamp(18px,3.4vw,25px);color:var(--violet);line-height:1.3;}

  /* Chrono */
  .timer-zone{
    text-align:center;background:var(--violet);
    border-radius:18px;box-shadow:var(--ombre);
    padding:26px 16px 28px;margin:30px 0;
  }
  .clock{font-weight:700;font-size:clamp(56px,14vw,98px);color:var(--blanc);line-height:1;letter-spacing:3px;}
  .clock.warn{color:var(--beige);}
  .clock.done{color:var(--beige);animation:blink .6s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25;}}

  .presets{margin:16px 0 6px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .presets button{
    font-family:'Advercase',sans-serif;font-size:15px;
    background:rgba(255,255,255,.12);color:var(--blanc);
    border:1px solid rgba(255,255,255,.55);border-radius:30px;
    padding:9px 20px;cursor:pointer;transition:.15s;
  }
  .presets button.active{background:var(--beige);color:var(--sombre);border-color:var(--beige);}
  .presets button:hover{background:var(--blanc);color:var(--violet);}

  .ctrls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
  .btn{
    font-family:'Advercase',sans-serif;font-weight:700;font-size:16px;
    border-radius:30px;padding:12px 26px;cursor:pointer;border:1px solid transparent;
    transition:.15s;letter-spacing:.5px;
  }
  .btn-go{background:var(--beige);color:var(--sombre);}
  .btn-go:hover{background:var(--blanc);}
  .btn-light{background:transparent;color:var(--blanc);border-color:rgba(255,255,255,.6);}
  .btn-light:hover{background:rgba(255,255,255,.15);}

  .opt{margin-top:18px;color:rgba(255,255,255,.92);font-size:14px;letter-spacing:.3px;}
  .opt input{transform:scale(1.2);margin-right:6px;vertical-align:middle;accent-color:var(--beige);}

  /* Editeur */
  .editor{margin-top:36px;border-top:1px solid rgba(153,138,181,.45);padding-top:22px;}
  .editor summary{font-weight:700;font-size:19px;color:var(--violet);cursor:pointer;letter-spacing:.3px;}
  .editor textarea{
    width:100%;min-height:220px;margin-top:14px;
    font-family:'Advercase',sans-serif;font-size:15px;line-height:1.5;
    padding:14px;border:1px solid rgba(153,138,181,.6);border-radius:12px;
    background:var(--blanc);color:var(--sombre);resize:vertical;
  }
  .editor textarea:focus{outline:none;border-color:var(--violet);}
  .editor .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:14px;}
  .hint{font-size:13px;color:var(--violet-moy);}
  .count{font-weight:700;color:var(--violet);}
  .saved{font-size:13px;color:var(--violet);opacity:0;transition:opacity .3s;}
  .saved.show{opacity:1;}

  .timer-zone .opt{display:block;}
  /* boutons references sur cartes */
  .refbtn{margin-top:14px;font-family:'Advercase',sans-serif;font-weight:700;font-size:13px;background:transparent;border:1px solid var(--violet-moy);color:var(--violet);border-radius:20px;padding:7px 16px;cursor:pointer;transition:.15s;}
  .refbtn:hover{background:var(--violet);color:#fff;}
  .refs{display:none;width:100%;margin-top:14px;}
  .refs.open{display:block;}
  .refs .thumbs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .refs .thumbs img{max-width:100%;max-height:220px;border-radius:10px;border:1px solid rgba(153,138,181,.4);}
  /* gestionnaire de sujets */
  .field{font-family:'Advercase',sans-serif;font-size:15px;padding:10px 13px;border:1px solid rgba(153,138,181,.6);border-radius:10px;background:#fff;color:var(--sombre);}
  .field:focus{outline:none;border-color:var(--violet);}
  .btn-sm{font-family:'Advercase',sans-serif;font-weight:700;font-size:14px;border:1px solid var(--violet);border-radius:10px;padding:10px 16px;cursor:pointer;background:var(--violet);color:#fff;transition:.15s;}
  .btn-sm:hover{background:var(--violet-moy);border-color:var(--violet-moy);}
  .btn-ghost{background:transparent;color:var(--violet);}
  .btn-ghost:hover{background:var(--violet);color:#fff;}
  .mgr-add{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0 18px;}
  .mgr-add .field{flex:1;min-width:200px;}
  .subj-item{border:1px solid rgba(153,138,181,.4);border-radius:14px;padding:16px;margin-bottom:14px;background:#fff;}
  .subj-row{display:flex;gap:10px;align-items:center;}

  { nom:"Hexagone",   svg:'<polygon points="60,10 104,35 104,85 60,110 16,85 16,35"/>' },
  { nom:"Étoile",     svg:'<polygon points="60,10 71.8,43.8 107.6,44.6 79,66.2 89.4,100.5 60,80 30.6,100.5 41,66.2 12.4,44.6 48.2,43.8"/>' },
  { nom:"Cœur",       svg:'<path d="M60,102 C24,74 16,42 37,29 C50,21 60,31 60,43 C60,31 70,21 83,29 C104,42 96,74 60,102 Z"/>' },
  { nom:"Écusson",    svg:'<path d="M22,18 H98 V60 C98,88 60,106 60,106 C60,106 22,88 22,60 Z"/>' },
  { nom:"Goutte",     svg:'<path d="M60,10 C60,10 96,58 96,80 A36,36 0 1 1 24,80 C24,58 60,10 60,10 Z"/>' },
  { nom:"Croissant",  svg:'<path d="M80,16 A48,48 0 1 0 80,104 A38,38 0 1 1 80,16 Z"/>' },
  { nom:"Banderole",  svg:'<path d="M10,42 H110 V78 H10 Z M10,42 L2,52 L10,62 M110,42 L118,52 L110,62"/>' }
];

const STORAGE_KEY = "flashGenSujets_v2";
const OLD_KEY = "flashGenSujets_v1";

/* ---- etat ---- */
let sujets = chargerListe();   // [{nom, images:[urlOuDataURI,...]}]
let currentTrio = [];
let dureeSec = 120;
let restant = dureeSec;
let timerId = null;
let enMarche = false;

/* ---- elements ---- */
const cardsEl   = document.getElementById('cards');
const shapeSvg  = document.getElementById('shapeSvg');
const shapeName = document.getElementById('shapeName');
const clockEl   = document.getElementById('clock');
const presetsEl = document.getElementById('presets');
const startBtn  = document.getElementById('startBtn');
const resetBtn  = document.getElementById('resetBtn');
const drawBtn   = document.getElementById('drawBtn');
const autoDraw  = document.getElementById('autoDraw');
const revealEnd = document.getElementById('revealEnd');
const newSubj   = document.getElementById('newSubj');
const addBtn    = document.getElementById('addBtn');
const restoreBtn= document.getElementById('restoreBtn');
const countEl   = document.getElementById('count');
const subjList  = document.getElementById('subjList');

/* =================== STOCKAGE =================== */
function normaliser(arr){
  return arr.map(x => (typeof x === 'string')
      ? {nom:x, images:[]}
      : {nom:String((x&&x.nom)||''), images:(x&&Array.isArray(x.images))?x.images.filter(Boolean):[]}
    ).filter(o=>o.nom.trim().length);
}
function defautObjets(){ return SUJETS_DEFAUT.map(s=>({nom:s, images:[]})); }
function chargerListe(){
  try{
    const s = localStorage.getItem(STORAGE_KEY);
    if(s){ const a=JSON.parse(s); if(Array.isArray(a)&&a.length) return normaliser(a); }
    const o = localStorage.getItem(OLD_KEY);
    if(o){ const a=JSON.parse(o); if(Array.isArray(a)&&a.length) return normaliser(a); }
  }catch(e){}
  return defautObjets();
}
function sauverListe(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(sujets)); return true; }
  catch(e){
    alert("La sauvegarde du navigateur est pleine (souvent à cause d'images importées trop lourdes). Supprimez quelques images, ou préférez des liens plutôt que des imports.");
    return false;
  }
}

/* =================== TIRAGE =================== */
function tirer3(){
  if(sujets.length===0) return [];
  if(sujets.length<=3) return [...sujets];
  const pool=[...sujets], choix=[];
  for(let i=0;i<3;i++){ const idx=Math.floor(Math.random()*pool.length); choix.push(pool.splice(idx,1)[0]); }
  return choix;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function afficherForme(){
  const f = FORMES[Math.floor(Math.random()*FORMES.length)];
  shapeSvg.innerHTML = f.svg;
  shapeName.textContent = f.nom;
}
function afficherTirage(){
  currentTrio = tirer3();
  if(currentTrio.length===0){
    cardsEl.innerHTML = '<div class="card"><span class="word">Liste vide</span></div>';
  } else {
    cardsEl.innerHTML = currentTrio.map((o,i)=>{
      const n=o.images.length;
      const btn = n ? `<button class="refbtn" data-i="${i}">Voir les références (${n})</button>` : '';
      return `<div class="card"><span class="num">${i+1}</span><span class="word">${escapeHtml(o.nom)}</span>${btn}<div class="refs" id="refs-${i}"></div></div>`;
    }).join('');
  }
  afficherForme();
}
function revealRefs(i){
  const o=currentTrio[i]; if(!o||!o.images.length) return;
  const box=document.getElementById('refs-'+i);
  const b=cardsEl.querySelector('.refbtn[data-i="'+i+'"]');
  box.innerHTML='<div class="thumbs">'+o.images.map(src=>`<img src="${escapeHtml(src)}" alt="référence">`).join('')+'</div>';
  box.classList.add('open');
  if(b) b.textContent='Masquer les références';
}
function hideRefs(i){
  const box=document.getElementById('refs-'+i);
  const b=cardsEl.querySelector('.refbtn[data-i="'+i+'"]');
  box.classList.remove('open'); box.innerHTML='';
  if(b) b.textContent='Voir les références ('+currentTrio[i].images.length+')';
}
cardsEl.addEventListener('click', e=>{
  const b=e.target.closest('.refbtn'); if(!b) return;
  const i=+b.dataset.i;
  const box=document.getElementById('refs-'+i);
  if(box.classList.contains('open')) hideRefs(i); else revealRefs(i);
});
function revealAll(){ currentTrio.forEach((o,i)=>{ if(o.images.length) revealRefs(i); }); }

/* =================== TIMER =================== */
function fmt(sec){const m=String(Math.floor(sec/60)).padStart(2,'0');const s=String(sec%60).padStart(2,'0');return `${m}:${s}`;}
function majClock(){clockEl.textContent=fmt(restant);clockEl.classList.toggle('warn',enMarche&&restant<=10&&restant>0);clockEl.classList.toggle('done',restant===0);}
function demarrer(){
  if(enMarche){clearInterval(timerId);enMarche=false;startBtn.textContent="Reprendre";return;}
  if(restant===0){restant=dureeSec;}
  enMarche=true;startBtn.textContent="Pause";clockEl.classList.remove('done');
  timerId=setInterval(()=>{
    restant--;majClock();
    if(restant<=0){
      clearInterval(timerId);enMarche=false;startBtn.textContent="Démarrer";bip();
      if(revealEnd && revealEnd.checked) revealAll();
      else if(autoDraw.checked) afficherTirage();
    }
  },1000);
}
function reset(){clearInterval(timerId);enMarche=false;restant=dureeSec;startBtn.textContent="Démarrer";majClock();}
function bip(){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="square";o.frequency.value=660;g.gain.setValueAtTime(.18,ctx.currentTime);o.start();g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.5);o.stop(ctx.currentTime+.5);}catch(e){}}

/* =================== GESTIONNAIRE =================== */
function renderManager(){
  countEl.textContent = sujets.length + ' sujets';
  subjList.innerHTML = sujets.map((o,i)=>{
    return `<div class="subj-item">
      <div class="subj-row">
        <input class="field name" data-i="${i}" value="${escapeHtml(o.nom)}">
        <button class="del" data-del="${i}" title="Supprimer le sujet">✕</button>
      </div>
    </div>`;
  }).join('');
}
/* Toute image (lien ou import) est redimensionnée à 800 px max
   sur chaque côté, puis compressée jusqu'à passer sous 1 Mo, et stockée. */
const MAXDIM=800, MAXBYTES=1024*1024;
function dataUrlBytes(d){ const i=d.indexOf(','); return i<0?0:Math.floor((d.length-i-1)*0.75); }
function compresser(canvas){
  let q=0.85, out=canvas.toDataURL('image/jpeg',q);
  while(dataUrlBytes(out)>MAXBYTES && q>0.35){ q-=0.1; out=canvas.toDataURL('image/jpeg',q); }
  return out;
}
function traiterImage(src, ok, echec){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    let w=img.width, h=img.height;
    if(!w||!h){ if(echec) echec(); return; }
    if(w>MAXDIM||h>MAXDIM){ const r=Math.min(MAXDIM/w,MAXDIM/h); w=Math.round(w*r); h=Math.round(h*r); }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    try{ ok(compresser(c)); }catch(e){ if(echec) echec(e); }
  };
  img.onerror=()=>{ if(echec) echec(); };
  img.src=src;
}
function importImage(file, cb){
  const reader=new FileReader();
  reader.onload=()=> traiterImage(reader.result, cb, ()=> alert("Impossible de traiter cette image."));
  reader.readAsDataURL(file);
}
function ajouterSujet(){
  const v=(newSubj.value||'').trim(); if(!v) return;
  sujets.push({nom:v, images:[]}); sauverListe(); newSubj.value=''; renderManager();
}
subjList.addEventListener('input', e=>{
  const n=e.target.closest('.name');
  if(n){ sujets[+n.dataset.i].nom = n.value; sauverListe(); }
});
subjList.addEventListener('change', e=>{
  const f=e.target.closest('input[type=file]');
  if(f && f.files && f.files[0]){
    const i=+f.dataset.file;
    importImage(f.files[0], src=>{ sujets[i].images.push(src); if(sauverListe()) renderManager(); });
    f.value='';
  }
});
subjList.addEventListener('click', e=>{
  const del=e.target.closest('[data-del]');
  if(del){ const i=+del.dataset.del; if(confirm('Supprimer ce sujet et ses références ?')){ sujets.splice(i,1); sauverListe(); renderManager(); } return; }
  const rm=e.target.closest('[data-rm]');
  if(rm){ const part=rm.dataset.rm.split(':'); sujets[+part[0]].images.splice(+part[1],1); sauverListe(); renderManager(); return; }
  const au=e.target.closest('[data-addurl]');
  if(au){
    const i=+au.dataset.addurl;
    const inp=subjList.querySelector('input.url[data-url="'+i+'"]');
    const v=((inp&&inp.value)||'').trim();
    if(v){
      traiterImage(v,
        src=>{ sujets[i].images.push(src); if(sauverListe()) renderManager(); },
        ()=>{ if(confirm("Cette image n'a pas pu être téléchargée puis optimisée (le site source en bloque peut-être l'accès). Conserver tout de même le lien d'origine, sans optimisation ?")){ sujets[i].images.push(v); if(sauverListe()) renderManager(); } });
    }
    return;
  }
});

/* =================== EVENEMENTS =================== */
presetsEl.addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  [...presetsEl.children].forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); dureeSec=parseInt(b.dataset.min,10)*60; reset();
});
startBtn.addEventListener('click', demarrer);
resetBtn.addEventListener('click', reset);
drawBtn.addEventListener('click', afficherTirage);
addBtn.addEventListener('click', ajouterSujet);
newSubj.addEventListener('keydown', e=>{ if(e.key==='Enter') ajouterSujet(); });
restoreBtn.addEventListener('click', ()=>{
  if(confirm("Revenir à la liste d'origine ? Vos sujets et images personnalisés seront remplacés.")){
    sujets=defautObjets(); sauverListe(); renderManager(); afficherTirage();
  }
});

/* =================== INIT =================== */
renderManager();
afficherTirage();
majClock();
</script>
</body>
</html>
